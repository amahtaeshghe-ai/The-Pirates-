<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pirates | Live TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg-dark: #09090b;
            --sidebar-bg: #121217;
            --accent: #ff4757;
            --accent-hover: #ff6b81;
            --text-main: #f1f2f6;
            --text-muted: #a4b0be;
            --border: #2f3542;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Styling */
        #sidebar {
            width: 320px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            z-index: 10;
        }

        .brand {
            padding: 24px 20px;
            font-size: 26px;
            font-weight: 800;
            color: var(--accent);
            text-align: center;
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
            letter-spacing: 3px;
            background: #000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .search-container {
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }

        #search-bar {
            width: 100%;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-dark);
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s;
        }

        #search-bar:focus {
            border-color: var(--accent);
        }

        #channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        /* Scrollbar Styling */
        #channel-list::-webkit-scrollbar { width: 6px; }
        #channel-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        #channel-list::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        .channel-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .channel-item:hover, .channel-item.active {
            background: rgba(255, 71, 87, 0.1);
            border-color: var(--accent);
            transform: translateX(5px);
        }

        .channel-logo {
            width: 45px; height: 45px;
            border-radius: 6px;
            margin-right: 15px;
            object-fit: contain;
            background: #000;
            padding: 2px;
        }

        .channel-info h4 {
            margin: 0 0 6px 0;
            font-size: 14px;
            font-weight: 600;
        }

        .channel-info span {
            font-size: 10px;
            color: var(--text-main);
            background: var(--border);
            padding: 3px 8px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Main Player Area */
        #main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            background: radial-gradient(circle at center, #1a1a24 0%, var(--bg-dark) 100%);
        }

        .now-playing {
            width: 100%;
            max-width: 1000px;
            margin-bottom: 15px;
            font-size: 20px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .video-container {
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border: 1px solid var(--border);
        }

        video { width: 100%; height: 100%; outline: none; }

        /* Responsive Layout */
        @media (max-width: 850px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: 50vh; order: 2; border-right: none; border-top: 1px solid var(--border); }
            #main-stage { height: 50vh; padding: 0; order: 1; background: #000; }
            .video-container { border-radius: 0; border: none; max-width: 100%; }
            .now-playing { display: none; }
        }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="brand">🏴‍☠️ The Pirates</div>
        <div class="search-container">
            <input type="text" id="search-bar" placeholder="Search fleet..." onkeyup="filterChannels()">
        </div>
        <div id="channel-list">
            <p style="text-align: center; color: var(--text-muted); margin-top: 20px;">Fetching the fleet...</p>
        </div>
    </aside>

    <main id="main-stage">
        <div class="now-playing" id="now-playing-text">Select a channel to cast off</div>
        <div class="video-container">
            <video id="player" controls></video>
        </div>
    </main>

    <script>
        const video = document.getElementById('player');
        const channelListEl = document.getElementById('channel-list');
        const nowPlayingText = document.getElementById('now-playing-text');
        let hls = null;
        let allChannels = [];

        // HLS Player Logic
        function playStream(url, name, element) {
            document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
            if(element) element.classList.add('active');
            
            nowPlayingText.innerHTML = `Watching: <span style="color: #ff4757;">${name}</span>`;

            if (Hls.isSupported()) {
                if (hls) hls.destroy();
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                
                // Error handling for dead streams
                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        nowPlayingText.innerHTML = `<span style="color: #ff4757;">Error: Stream is currently offline or blocked.</span>`;
                    }
                });

            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', () => video.play());
            }
        }

        // Fetch and parse the iptv.m3u8 file
        async function loadPlaylists() {
            try {
                // Ensure this file path matches your OUTPUT_FILE from .env
                const response = await fetch('iptv.m3u8'); 
                const data = await response.text();
                const lines = data.split('\n');
                let currentChannel = {};

                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (line.startsWith('#EXTINF:-1')) {
                        const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                        currentChannel.logo = logoMatch ? logoMatch[1] : 'https://dummyimage.com/100x100/121217/ffffff.png&text=TV';
                        const groupMatch = line.match(/group-title="([^"]+)"/);
                        currentChannel.group = groupMatch ? groupMatch[1] : 'Live';
                        const nameParts = line.split(',');
                        currentChannel.name = nameParts[nameParts.length - 1];
                    } 
                    else if (line && !line.startsWith('#')) {
                        currentChannel.url = line;
                        allChannels.push(currentChannel);
                        currentChannel = {}; 
                    }
                }
                renderChannels(allChannels);
            } catch (error) {
                channelListEl.innerHTML = '<p style="color: var(--accent); text-align: center;">Failed to load fleet. Ensure iptv.m3u8 is generated.</p>';
            }
        }

        // Render channels to the sidebar
        function renderChannels(channels) {
            channelListEl.innerHTML = '';
            if (channels.length === 0) {
                channelListEl.innerHTML = '<p style="text-align: center; color: var(--text-muted);">No channels found.</p>';
                return;
            }
            channels.forEach(channel => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                div.innerHTML = `
                    <img src="${channel.logo}" class="channel-logo" alt="logo" onerror="this.src='https://dummyimage.com/100x100/121217/ffffff.png&text=TV'">
                    <div class="channel-info">
                        <h4>${channel.name}</h4>
                        <span>${channel.group}</span>
                    </div>
                `;
                div.onclick = () => playStream(channel.url, channel.name, div);
                channelListEl.appendChild(div);
            });
        }

        // Search Bar Logic
        function filterChannels() {
            const query = document.getElementById('search-bar').value.toLowerCase();
            const filtered = allChannels.filter(channel => 
                channel.name.toLowerCase().includes(query) || 
                channel.group.toLowerCase().includes(query)
            );
            renderChannels(filtered);
        }

        // Initialize
        loadPlaylists();
    </script>
</body>
</html>
